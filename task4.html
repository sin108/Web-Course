<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4</title>

    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            border: 2px solid #333;
        }

        /* thead {
            background-color: #4a7a8f;
            color: white;
        } */

        th {
            border: 1px solid #333;
            padding: 12px;
            text-align: center;
            font-weight: bold;
        }

        td {
            border: 1px solid #666;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
    <header>
        <h1>Task 4: Student Scores</h1>
    </header>

    <main>
        <section>
            <table>
                <thead>
                    <tr>
                        <th rowspan="2">No</th>
                        <th rowspan="2">Student Name</th>
                        <th colspan="4">Score</th>
                    </tr>
                    <tr>
                        <th>Attendance</th>
                        <th>Homework and Lab</th>
                        <th>Project</th>
                        <th>Total Score</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>John Doe</td>
                        <td>20</td>
                        <td>25</td>
                        <td>35</td>
                        <td>60</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Jane Smith</td>
                        <td>18</td>
                        <td>22</td>
                        <td>30</td>
                        <td>70</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Emily Johnson</td>
                        <td>19</td>
                        <td>24</td>
                        <td>32</td>
                        <td>75</td>
                    </tr>
                    <tr>
                        <td colspan="5" style="text-align: right; font-weight: bold;">Total</td>
                        <td style="font-weight: bold;" >205</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    
</body>
</html>

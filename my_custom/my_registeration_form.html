<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Registration Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            text-align: center;
            color: white;
            animation: slideDown 0.6s ease-out;
            z-index: 100;
        }

        header h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        main {
            width: 100%;
            max-width: 500px;
            margin-top: 80px;
        }

        .form-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 25px;
            animation: fadeIn 0.6s ease-out;
            animation-fill-mode: both;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        .form-group:nth-child(5) { animation-delay: 0.5s; }
        .form-group:nth-child(6) { animation-delay: 0.6s; }
        .form-group:nth-child(7) { animation-delay: 0.7s; }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
        }

        .required {
            color: #e74c3c;
            margin-left: 2px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
            transform: translateY(-2px);
        }

        input[type="text"]:invalid:not(:placeholder-shown),
        input[type="email"]:invalid:not(:placeholder-shown),
        input[type="password"]:invalid:not(:placeholder-shown),
        input[type="tel"]:invalid:not(:placeholder-shown) {
            border-color: #e74c3c;
        }

        input[type="text"]:valid:not(:placeholder-shown),
        input[type="email"]:valid:not(:placeholder-shown),
        input[type="password"]:valid:not(:placeholder-shown),
        input[type="tel"]:valid:not(:placeholder-shown) {
            border-color: #27ae60;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .radio-option {
            display: flex;
            align-items: center;
        }

        input[type="radio"] {
            margin-right: 8px;
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }

        .radio-option label {
            margin: 0;
            font-weight: 500;
            cursor: pointer;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: 5px;
            display: none;
            animation: shake 0.3s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message.show {
            display: block;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        input[type="submit"],
        input[type="reset"] {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="submit"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        input[type="submit"]:active {
            transform: translateY(0);
        }

        input[type="reset"] {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        input[type="reset"]:hover {
            background: #e0e0e0;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.5s ease-out;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>

<body>
    <header>
        <h1>Registration Form</h1>
    </header>

    <main>
        <div class="form-container">
            <div class="success-message" id="successMessage">
                ✓ Registration successful!
            </div>
            <form id="registrationForm">
                <!-- Full Name -->
                <div class="form-group">
                    <label for="name">
                        Full Name<span class="required">*</span>
                    </label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required minlength="2" />
                    <div class="error-message" id="nameError"></div>
                </div>

                <!-- Gender -->
                <div class="form-group">
                    <label>Gender<span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="male" name="gender" value="male" required />
                            <label for="male">Male</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="female" name="gender" value="female" />
                            <label for="female">Female</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="other" name="gender" value="other" />
                            <label for="other">Other</label>
                        </div>
                    </div>
                    <div class="error-message" id="genderError"></div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">
                        Email<span class="required">*</span>
                    </label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required />
                    <div class="error-message" id="emailError"></div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">
                        Password<span class="required">*</span>
                    </label>
                    <input type="password" id="password" name="password" placeholder="Enter password (min 8 characters)" required minlength="8" />
                    <div class="error-message" id="passwordError"></div>
                </div>

                <!-- Phone Number -->
                <div class="form-group">
                    <label for="phone">
                        Phone Number<span class="required">*</span>
                    </label>
                    <input type="tel" id="phone" name="phone" placeholder="10 digits (e.g., 1234567890)" required pattern="[0-9]{10}" />
                    <div class="error-message" id="phoneError"></div>
                </div>

                <!-- Country -->
                <div class="form-group">
                    <label for="country">
                        Country<span class="required">*</span>
                    </label>
                    <select id="country" name="country" required>
                        <option value="">Select a country</option>
                        <option value="cambodia">Cambodia</option>
                        <option value="uk">United Kingdom</option>
                        <option value="canada">Canada</option>
                    </select>
                    <div class="error-message" id="countryError"></div>
                </div>

                <!-- Bio -->
                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" placeholder="Tell us about yourself (optional)"></textarea>
                </div>

                <!-- Submit and Reset Buttons -->
                <div class="button-group">
                    <input type="submit" value="Register" />
                    <input type="reset" value="Clear" />
                </div>
            </form>
        </div>
    </main>

    <script>
        const form = document.getElementById('registrationForm');
        const successMessage = document.getElementById('successMessage');

        // Validation rules
        const validations = {
            name: {
                validate: (value) => value.trim().length >= 2,
                message: 'Name must be at least 2 characters'
            },
            gender: {
                validate: () => document.querySelector('input[name="gender"]:checked'),
                message: 'Please select a gender'
            },
            email: {
                validate: (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value),
                message: 'Please enter a valid email'
            },
            password: {
                validate: (value) => value.length >= 8,
                message: 'Password must be at least 8 characters'
            },
            phone: {
                validate: (value) => /^[0-9]{10}$/.test(value),
                message: 'Phone must be exactly 10 digits'
            },
            country: {
                validate: (value) => value !== '',
                message: 'Please select a country'
            }
        };

        // Real-time validation
        Object.keys(validations).forEach(fieldName => {
            const field = document.getElementById(fieldName);
            if (field) {
                field.addEventListener('blur', () => validateField(fieldName));
                field.addEventListener('input', () => {
                    if (document.getElementById(fieldName + 'Error').classList.contains('show')) {
                        validateField(fieldName);
                    }
                });
            }
        });

        function validateField(fieldName) {
            const field = document.getElementById(fieldName);
            const errorElement = document.getElementById(fieldName + 'Error');
            const validation = validations[fieldName];

            let isValid = false;
            if (fieldName === 'gender') {
                isValid = validation.validate();
            } else {
                isValid = validation.validate(field.value);
            }

            if (!isValid) {
                errorElement.textContent = validation.message;
                errorElement.classList.add('show');
                return false;
            } else {
                errorElement.classList.remove('show');
                return true;
            }
        }

        // Form submission
        form.addEventListener('submit', function (e) {
            e.preventDefault();

            let isFormValid = true;
            Object.keys(validations).forEach(fieldName => {
                if (!validateField(fieldName)) {
                    isFormValid = false;
                }
            });

            if (isFormValid) {
                successMessage.classList.add('show');
                form.style.opacity = '0.5';
                form.style.pointerEvents = 'none';

                setTimeout(() => {
                    form.reset();
                    form.style.opacity = '1';
                    form.style.pointerEvents = 'auto';
                    successMessage.classList.remove('show');
                    document.querySelectorAll('.error-message').forEach(msg => msg.classList.remove('show'));
                }, 2000);
            }
        });
    </script>
</body>

</html>

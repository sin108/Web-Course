<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>

    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            border: 2px solid #333;
            margin: 10px 0; 
            
        }
        th {
            border: 1px solid #333;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }

        td {
            border: 1px solid #666;
            padding: 12px;
            text-align: left;
        }
        .divider {
            border: 1px solid #ccc;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <header></header>
        <h1>Task 3: Product Table</h1>
    </header>

    <main>
        <div class="divider"></div>
        <section>
            <table>
                <thead>
                    <tr>
                        <th>No.</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Unit Price</th>
                        <th>Total</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Coca Cola</td>
                        <td>5</td>
                        <td>$10.00</td>
                        <td>$50.00</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Pepsi</td>
                        <td>3</td>
                        <td>$8.00</td>
                        <td>$24.00</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Fanta</td>
                        <td>2</td>
                        <td>$9.00</td>
                        <td>$18.00</td>
                    </tr>
                    <tr>
                        <td colspan="4" style="font-weight: bold; text-align: right;">Total</td>
                        <td>$92.00</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
